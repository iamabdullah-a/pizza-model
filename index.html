<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebAR Viewer</title>

    <!-- MindAR + A-Frame via CDN (no install needed) -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', sans-serif;
        background: #000;
        overflow: hidden;
      }

      /* ── Loading Screen ── */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease;
      }

      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loader-logo {
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: 0.3em;
        color: #fff;
        margin-bottom: 2rem;
        text-transform: uppercase;
      }

      .loader-logo span {
        color: #00d4ff;
      }

      .spinner {
        width: 44px;
        height: 44px;
        border: 3px solid rgba(255,255,255,0.1);
        border-top-color: #00d4ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 1.2rem;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .loader-text {
        color: rgba(255,255,255,0.45);
        font-size: 0.8rem;
        letter-spacing: 0.1em;
      }

      /* ── UI Overlay ── */
      #ui-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 100;
      }

      /* Top bar */
      .top-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 1rem 1.2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
      }

      .brand {
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: #fff;
        text-transform: uppercase;
      }

      .brand span {
        color: #00d4ff;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ff4444;
        box-shadow: 0 0 6px #ff4444;
        transition: background 0.3s, box-shadow 0.3s;
      }

      .status-dot.active {
        background: #00ff88;
        box-shadow: 0 0 6px #00ff88;
      }

      /* Scan hint */
      .scan-hint {
        position: absolute;
        bottom: 6rem;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 2rem;
        padding: 0.6rem 1.4rem;
        color: rgba(255,255,255,0.75);
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        white-space: nowrap;
        backdrop-filter: blur(8px);
        animation: pulse-hint 2.5s ease-in-out infinite;
        transition: opacity 0.4s ease;
      }

      .scan-hint.hidden {
        opacity: 0;
      }

      @keyframes pulse-hint {
        0%, 100% { opacity: 0.75; }
        50%       { opacity: 1;    }
      }

      /* Corner brackets — scanning frame */
      .frame {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(70vw, 280px);
        height: min(70vw, 280px);
      }

      .frame::before,
      .frame::after,
      .frame-inner::before,
      .frame-inner::after {
        content: '';
        position: absolute;
        width: 22px;
        height: 22px;
        border-color: rgba(0, 212, 255, 0.7);
        border-style: solid;
      }

      .frame::before        { top: 0;    left: 0;   border-width: 2px 0 0 2px; }
      .frame::after         { top: 0;    right: 0;  border-width: 2px 2px 0 0; }
      .frame-inner::before  { bottom: 0; left: 0;   border-width: 0 0 2px 2px; }
      .frame-inner::after   { bottom: 0; right: 0;  border-width: 0 2px 2px 0; }

      .frame.detected::before,
      .frame.detected::after,
      .frame.detected .frame-inner::before,
      .frame.detected .frame-inner::after {
        border-color: #00ff88;
        transition: border-color 0.3s ease;
      }

      /* Bottom bar */
      .bottom-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 1rem 1.2rem 1.4rem;
        background: linear-gradient(to top, rgba(0,0,0,0.55), transparent);
        display: flex;
        justify-content: center;
        gap: 1rem;
      }

      .btn {
        pointer-events: all;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.18);
        color: #fff;
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        padding: 0.5rem 1rem;
        border-radius: 2rem;
        cursor: pointer;
        backdrop-filter: blur(8px);
        text-transform: uppercase;
        transition: background 0.2s, border-color 0.2s;
        -webkit-tap-highlight-color: transparent;
      }

      .btn:active {
        background: rgba(0, 212, 255, 0.2);
        border-color: rgba(0, 212, 255, 0.5);
      }

      /* ── A-Scene fills screen ── */
      a-scene {
        position: fixed !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>

  <body>

    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loader-logo">Sky<span>Labs</span> AR</div>
      <div class="spinner"></div>
      <p class="loader-text">Initialising camera…</p>
    </div>

    <!-- UI Overlay -->
    <div id="ui-overlay">
      <div class="top-bar">
        <div class="brand">Sky<span>Labs</span></div>
        <div class="status-dot" id="status-dot"></div>
      </div>

      <div class="frame" id="scan-frame">
        <div class="frame-inner"></div>
      </div>

      <p class="scan-hint" id="scan-hint">Point camera at the target image</p>

      <div class="bottom-bar">
        <button class="btn" onclick="resetScene()">↺ Reset</button>
        <button class="btn" onclick="toggleScale()">⤢ Scale</button>
      </div>
    </div>

    <!-- AR Scene -->
    <a-scene
      mindar-image="imageTargetSrc: assets/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      id="ar-scene"
    >
      <a-assets>
        <a-asset-item id="model" src="assets/model.glb"></a-asset-item>
      </a-assets>

      <!-- Camera -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Lighting -->
      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" color="#ffffff" intensity="1.2"
               position="1 2 1"></a-light>

      <!-- AR Target: model appears when target image is detected -->
      <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
        <a-gltf-model
          id="ar-model"
          src="#model"
          position="0 0 0.05"
          scale="0.12 0.12 0.12"
          rotation="0 0 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
        ></a-gltf-model>
      </a-entity>

    </a-scene>

    <script>
      // ── State ──────────────────────────────────────────────
      let scaleToggle = false;
      const scales   = ['0.08 0.08 0.08', '0.12 0.12 0.12', '0.18 0.18 0.18'];
      let scaleIdx    = 1;

      // ── Hide loading screen once A-Frame is ready ──────────
      document.querySelector('a-scene').addEventListener('loaded', () => {
        const ls = document.getElementById('loading-screen');
        ls.classList.add('hidden');
        setTimeout(() => ls.style.display = 'none', 700);
      });

      // ── Target detected / lost ─────────────────────────────
      const target   = document.getElementById('ar-target');
      const dot      = document.getElementById('status-dot');
      const hint     = document.getElementById('scan-hint');
      const frame    = document.getElementById('scan-frame');

      target.addEventListener('targetFound', () => {
        dot.classList.add('active');
        hint.classList.add('hidden');
        frame.classList.add('detected');
      });

      target.addEventListener('targetLost', () => {
        dot.classList.remove('active');
        hint.classList.remove('hidden');
        frame.classList.remove('detected');
      });

      // ── Buttons ────────────────────────────────────────────
      function resetScene() {
        const model = document.getElementById('ar-model');
        scaleIdx = 1;
        model.setAttribute('scale', scales[scaleIdx]);
        model.setAttribute('rotation', '0 0 0');
      }

      function toggleScale() {
        scaleIdx = (scaleIdx + 1) % scales.length;
        document.getElementById('ar-model')
                .setAttribute('scale', scales[scaleIdx]);
      }
    </script>

  </body>
</html>
