<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>SkyLabs AR</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

      html, body {
        width:100%; height:100%;
        overflow:hidden;
        background:#000;
        font-family:'Segoe UI', system-ui, sans-serif;
        touch-action:none;
      }

      /* ── Camera feed ── */
      video {
        position:fixed !important;
        top:0 !important; left:0 !important;
        width:100vw !important; height:100vh !important;
        object-fit:cover !important;
        z-index:1 !important;
        display:block !important;
        visibility:visible !important;
        opacity:1 !important;
        pointer-events:none !important;
        image-rendering:auto !important;
        filter:none !important;
      }

      #mindar-ar-container,
      .mindar-ar-container {
        position:fixed !important;
        top:0 !important; left:0 !important;
        width:100vw !important; height:100vh !important;
        z-index:1 !important;
      }

      .mindar-ui-overlay,
      .mindar-ui-scanning { display:none !important; }

      a-scene {
        position:fixed !important;
        top:0 !important; left:0 !important;
        width:100vw !important; height:100vh !important;
        z-index:2 !important;
        background:transparent !important;
      }

      canvas.a-canvas {
        background:transparent !important;
        position:fixed !important;
        top:0 !important; left:0 !important;
        width:100vw !important; height:100vh !important;
        z-index:2 !important;
      }

      #ui {
        position:fixed; inset:0;
        z-index:100;
        pointer-events:none;
      }

      /* ── Loading ── */
      #loading-screen {
        position:fixed; inset:0; background:#050505;
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        z-index:9999; gap:1.2rem;
        transition:opacity 0.7s ease;
      }
      #loading-screen.fade-out { opacity:0; pointer-events:none; }
      .brand-title { font-size:1.5rem; font-weight:800; letter-spacing:0.35em; text-transform:uppercase; color:#fff; }
      .brand-title span { color:#00d4ff; }
      .spinner { width:42px; height:42px; border:3px solid rgba(255,255,255,0.08); border-top-color:#00d4ff; border-radius:50%; animation:spin 0.75s linear infinite; }
      @keyframes spin { to { transform:rotate(360deg); } }
      .loading-label { font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase; color:rgba(255,255,255,0.35); }

      /* ── Error ── */
      #error-screen {
        display:none; position:fixed; inset:0; background:#050505; z-index:9998;
        flex-direction:column; align-items:center; justify-content:center;
        gap:1rem; padding:2rem; text-align:center;
      }
      #error-screen.visible { display:flex; }
      .error-icon { font-size:2.5rem; }
      .error-title { font-size:1rem; font-weight:700; color:#fff; }
      .error-msg { font-size:0.78rem; color:rgba(255,255,255,0.45); line-height:1.6; max-width:280px; }
      .error-btn { margin-top:0.5rem; background:#00d4ff; color:#000; font-size:0.75rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:0.65rem 1.6rem; border-radius:999px; border:none; cursor:pointer; }

      /* ── Top bar ── */
      .top-bar {
        position:absolute; top:0; left:0; right:0;
        padding:12px 1.2rem 1rem;
        display:flex; align-items:center; justify-content:space-between;
        background:linear-gradient(180deg,rgba(0,0,0,0.65) 0%,transparent 100%);
      }
      .brand { font-size:0.95rem; font-weight:800; letter-spacing:0.25em; text-transform:uppercase; color:#fff; }
      .brand span { color:#00d4ff; }
      .status { display:flex; align-items:center; gap:0.5rem; }
      .status-dot { width:9px; height:9px; border-radius:50%; background:#ff3b3b; box-shadow:0 0 8px #ff3b3b; transition:background 0.35s, box-shadow 0.35s; }
      .status-dot.found { background:#00ff88; box-shadow:0 0 8px #00ff88; }
      .status-label { font-size:0.65rem; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.5); }

      /* ── Toast ── */
      #toast {
        position:absolute; top:5rem; left:50%; transform:translateX(-50%);
        background:rgba(0,0,0,0.65); border:1px solid rgba(0,212,255,0.3);
        backdrop-filter:blur(10px); border-radius:999px; padding:0.45rem 1.1rem;
        color:rgba(255,255,255,0.8); font-size:0.68rem; letter-spacing:0.1em;
        white-space:nowrap; opacity:0; transition:opacity 0.35s; pointer-events:none;
      }
      #toast.show { opacity:1; }

      /* ── Scan frame ── */
      .scan-frame {
        position:absolute; top:50%; left:50%;
        transform:translate(-50%,-52%);
        width:min(68vw,260px); height:min(68vw,260px);
        transition:opacity 0.4s;
      }
      .scan-frame.hidden { opacity:0; pointer-events:none; }
      .corner { position:absolute; width:24px; height:24px; border-color:rgba(0,212,255,0.65); border-style:solid; transition:border-color 0.3s, width 0.3s, height 0.3s; }
      .corner.tl { top:0;    left:0;  border-width:2.5px 0 0 2.5px; }
      .corner.tr { top:0;    right:0; border-width:2.5px 2.5px 0 0; }
      .corner.bl { bottom:0; left:0;  border-width:0 0 2.5px 2.5px; }
      .corner.br { bottom:0; right:0; border-width:0 2.5px 2.5px 0; }
      .scan-frame.found .corner { border-color:#00ff88; width:30px; height:30px; }
      .scan-line { position:absolute; left:4px; right:4px; height:1.5px; background:linear-gradient(90deg,transparent,#00d4ff,transparent); animation:scanline 2.2s ease-in-out infinite; opacity:0.7; }
      @keyframes scanline { 0%{top:4px;opacity:0} 10%{opacity:0.7} 90%{opacity:0.7} 100%{top:calc(100% - 4px);opacity:0} }
      .scan-frame.found .scan-line { display:none; }

      /* ── Hint ── */
      .hint {
        position:absolute; bottom:7.5rem; left:50%; transform:translateX(-50%);
        background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.1);
        backdrop-filter:blur(10px); border-radius:999px; padding:0.55rem 1.3rem;
        color:rgba(255,255,255,0.7); font-size:0.74rem; letter-spacing:0.06em;
        white-space:nowrap; animation:pulse 2.5s ease-in-out infinite; transition:opacity 0.4s;
      }
      .hint.hidden { opacity:0; pointer-events:none; }
      @keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }

      /* ── Gesture guide ── */
      #gesture-guide {
        position:absolute; bottom:7.5rem; left:50%; transform:translateX(-50%);
        display:flex; gap:0.8rem; opacity:0; transition:opacity 0.5s; pointer-events:none;
      }
      #gesture-guide.show { opacity:1; }
      .g-item { display:flex; flex-direction:column; align-items:center; gap:0.3rem; }
      .g-icon { font-size:1.1rem; background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.12); backdrop-filter:blur(8px); border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
      .g-label { font-size:0.52rem; letter-spacing:0.08em; text-transform:uppercase; color:rgba(255,255,255,0.4); }

      /* ── Bottom bar ── */
      .bottom-bar {
        position:absolute; bottom:0; left:0; right:0;
        padding:1rem 1.5rem 1.4rem;
        display:flex; justify-content:center; gap:0.65rem;
        background:linear-gradient(0deg,rgba(0,0,0,0.55) 0%,transparent 100%);
        pointer-events:all;
      }
      .btn {
        background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
        color:rgba(255,255,255,0.85); font-size:0.68rem; font-weight:600;
        letter-spacing:0.1em; text-transform:uppercase; padding:0.5rem 1rem;
        border-radius:999px; cursor:pointer; backdrop-filter:blur(8px);
        -webkit-tap-highlight-color:transparent;
        transition:background 0.2s, border-color 0.2s, transform 0.1s; user-select:none;
      }
      .btn:active { background:rgba(0,212,255,0.18); border-color:rgba(0,212,255,0.45); transform:scale(0.95); }
      .btn.on { background:rgba(0,212,255,0.18); border-color:rgba(0,212,255,0.4); color:#00d4ff; }
    </style>
  </head>

  <body>

    <div id="loading-screen">
      <div class="brand-title">Sky<span>Labs</span> AR</div>
      <div class="spinner"></div>
      <p class="loading-label">Starting camera…</p>
    </div>

    <div id="error-screen">
      <div class="error-icon">📷</div>
      <div class="error-title">Camera Not Working</div>
      <p class="error-msg">Allow camera in Chrome → Settings → Site Settings → Camera, then hard-reload.</p>
      <button class="error-btn" onclick="location.reload()">Reload</button>
    </div>

    <div id="ui">
      <div class="top-bar">
        <div class="brand">Sky<span>Labs</span></div>
        <div class="status">
          <div class="status-dot" id="status-dot"></div>
          <span class="status-label" id="status-label">Scanning</span>
        </div>
      </div>

      <div id="toast"></div>

      <div class="scan-frame" id="scan-frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="scan-line"></div>
      </div>

      <div class="hint" id="hint">Point camera at target image</div>

      <div id="gesture-guide">
        <div class="g-item"><div class="g-icon">👆</div><div class="g-label">Drag</div></div>
        <div class="g-item"><div class="g-icon">🤏</div><div class="g-label">Pinch</div></div>
        <div class="g-item"><div class="g-icon">✌️</div><div class="g-label">Twist</div></div>
      </div>

      <div class="bottom-bar">
        <button class="btn" id="btn-spin"  onclick="toggleSpin()">⟳ Spin</button>
        <button class="btn"                onclick="resetModel()">↺ Reset</button>
        <button class="btn" id="btn-float" onclick="toggleFloat()">↕ Float</button>
        <button class="btn" id="btn-wire"  onclick="toggleWire()">◈ Wire</button>
      </div>
    </div>

    <a-scene
      embedded
      mindar-image="imageTargetSrc: assets/targets.mind;
                    autoStart: true;
                    uiLoading: no;
                    uiError: no;
                    uiScanning: no;
                    filterMinCF: 0.001;
                    filterBeta: 0.05;
                    warmupTolerance: 5;
                    missTolerance: 5;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      id="arScene"
    >
      <a-assets timeout="30000">
        <a-asset-item id="model" src="assets/model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-light type="ambient"     intensity="0.9" color="#ffffff"></a-light>
      <a-light type="directional" intensity="1.4" color="#ffffff" position="2 4 2"></a-light>
      <a-light type="directional" intensity="0.4" color="#aaddff" position="-2 1 -2"></a-light>
      <a-light type="point"       intensity="0.5" color="#00d4ff" position="0 3 0"></a-light>

      <a-entity mindar-image-target="targetIndex: 0" id="arTarget">
        <a-circle radius="0.14" rotation="-90 0 0" position="0 -0.001 0"
          material="color:#000;opacity:0.18;transparent:true;shader:flat">
        </a-circle>
        <a-entity id="wrapper" position="0 0 0" rotation="0 0 0" scale="0.12 0.12 0.12">
          <a-gltf-model id="arModel" src="#model" position="0 0 0" rotation="0 0 0">
          </a-gltf-model>
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
    const scene      = document.getElementById('arScene');
    const arTarget   = document.getElementById('arTarget');
    const wrapper    = document.getElementById('wrapper');
    const loadScreen = document.getElementById('loading-screen');
    const errScreen  = document.getElementById('error-screen');
    const dot        = document.getElementById('status-dot');
    const lbl        = document.getElementById('status-label');
    const hint       = document.getElementById('hint');
    const frame      = document.getElementById('scan-frame');
    const guide      = document.getElementById('gesture-guide');
    const toastEl    = document.getElementById('toast');
    const btnSpin    = document.getElementById('btn-spin');
    const btnFloat   = document.getElementById('btn-float');
    const btnWire    = document.getElementById('btn-wire');

    // ── Model state ────────────────────────────────────────
    const S = {
      scale: 0.12, rotX: 0, rotY: 0, posY: 0,
      spin: false, float: false, wire: false, detected: false,
    };
    const SCALE_MIN = 0.03, SCALE_MAX = 0.60;

    // ── Smoothing ──────────────────────────────────────────
    const SMOOTH = 0.25;
    let smRotX = 0, smRotY = 0, smScale = 0.12;
    function lerp(a, b, t) { return a + (b - a) * t; }

    function applyTransform() {
      smRotX  = lerp(smRotX,  S.rotX,  SMOOTH);
      smRotY  = lerp(smRotY,  S.rotY,  SMOOTH);
      smScale = lerp(smScale, S.scale, SMOOTH);
      wrapper.setAttribute('scale',    `${smScale} ${smScale} ${smScale}`);
      wrapper.setAttribute('rotation', `${smRotX} ${smRotY} 0`);
      wrapper.setAttribute('position', `0 ${S.posY} 0`);
    }

    function applyDirect() {
      wrapper.setAttribute('scale',    `${S.scale} ${S.scale} ${S.scale}`);
      wrapper.setAttribute('rotation', `${S.rotX} ${S.rotY} 0`);
      wrapper.setAttribute('position', `0 ${S.posY} 0`);
    }

    // ── Animation loop ─────────────────────────────────────
    let lastTs = null, floatT = 0;
    function loop(ts) {
      if (S.detected) {
        const dt = lastTs ? ts - lastTs : 0;
        if (S.spin)  S.rotY = (S.rotY + dt * 0.04) % 360;
        if (S.float) { floatT += dt * 0.002; S.posY = Math.sin(floatT) * 0.04; }
        if (S.spin || S.float) applyDirect();
      }
      lastTs = ts;
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // ── Scene loaded ───────────────────────────────────────
    scene.addEventListener('loaded', () => {
      setTimeout(() => {
        document.querySelectorAll('video').forEach(v => {
          v.style.cssText = [
            'position:fixed!important','top:0!important','left:0!important',
            'width:100vw!important','height:100vh!important',
            'object-fit:cover!important','z-index:1!important',
            'display:block!important','visibility:visible!important',
            'opacity:1!important','pointer-events:none!important',
            'image-rendering:auto!important',
          ].join(';');

          // Upgrade camera to highest quality available
          if (v.srcObject) {
            navigator.mediaDevices.getUserMedia({
              video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
            }).then(stream => {
              const old = v.srcObject.getVideoTracks()[0];
              if (old) old.stop();
              v.srcObject = stream;
            }).catch(() => {});
          }
        });

        loadScreen.classList.add('fade-out');
        setTimeout(() => loadScreen.style.display = 'none', 750);
      }, 900);
    });

    const errTimer = setTimeout(() => {
      if (loadScreen.style.display !== 'none') {
        loadScreen.style.display = 'none';
        errScreen.classList.add('visible');
      }
    }, 16000);
    scene.addEventListener('loaded', () => clearTimeout(errTimer));

    // ── Target found / lost ────────────────────────────────
    arTarget.addEventListener('targetFound', () => {
      S.detected = true;
      dot.classList.add('found'); lbl.textContent = 'Detected';
      hint.classList.add('hidden');
      frame.classList.add('found', 'hidden');
      guide.classList.add('show');
      setTimeout(() => guide.classList.remove('show'), 3500);
    });

    arTarget.addEventListener('targetLost', () => {
      S.detected = false;
      dot.classList.remove('found'); lbl.textContent = 'Scanning';
      hint.classList.remove('hidden');
      frame.classList.remove('found', 'hidden');
      guide.classList.remove('show');
    });

    // ── Toast ──────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
    }

    // ── Buttons ────────────────────────────────────────────
    function toggleSpin() {
      S.spin = !S.spin;
      btnSpin.classList.toggle('on', S.spin);
      showToast(S.spin ? 'Auto-spin on' : 'Auto-spin off');
    }

    function toggleFloat() {
      S.float = !S.float;
      if (!S.float) { S.posY = 0; applyDirect(); }
      btnFloat.classList.toggle('on', S.float);
      showToast(S.float ? 'Float on' : 'Float off');
    }

    function toggleWire() {
      S.wire = !S.wire;
      const m = document.getElementById('arModel');
      if (m && m.object3D) {
        m.object3D.traverse(n => {
          if (n.isMesh && n.material) {
            (Array.isArray(n.material) ? n.material : [n.material])
              .forEach(mat => mat.wireframe = S.wire);
          }
        });
      }
      btnWire.classList.toggle('on', S.wire);
      showToast(S.wire ? 'Wireframe on' : 'Wireframe off');
    }

    function resetModel() {
      S.scale = 0.12; S.rotX = 0; S.rotY = 0; S.posY = 0;
      smRotX = 0; smRotY = 0; smScale = 0.12;
      S.spin = false; S.float = false; floatT = 0;
      btnSpin.classList.remove('on');
      btnFloat.classList.remove('on');
      applyDirect();
      showToast('Reset ✓');
    }

    // ══════════════════════════════════════════════════════
    //  GESTURE SYSTEM
    //  — mode locked at touchstart (no mid-gesture mixing)
    //  — pinch ratio clamped per frame
    //  — inertia on drag release
    //  — double-tap REMOVED
    // ══════════════════════════════════════════════════════
    const G = {
      mode: null,
      lastX: 0, lastY: 0,
      lastDist: 0, lastAngle: 0,
      vRotX: 0, vRotY: 0,
      lastMoveTime: 0,
    };

    let inertiaFrame = null;

    function applyInertia() {
      if (Math.abs(G.vRotX) < 0.01 && Math.abs(G.vRotY) < 0.01) {
        G.vRotX = 0; G.vRotY = 0; return;
      }
      G.vRotX *= 0.92; G.vRotY *= 0.92;
      S.rotX = Math.max(-75, Math.min(75, S.rotX + G.vRotX));
      S.rotY += G.vRotY;
      applyDirect();
      inertiaFrame = requestAnimationFrame(applyInertia);
    }

    function getTouchDist(t1, t2) {
      return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
    }
    function getTouchAngle(t1, t2) {
      return Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX) * 180 / Math.PI;
    }

    document.addEventListener('touchstart', e => {
      if (!S.detected) return;
      e.preventDefault();
      cancelAnimationFrame(inertiaFrame);
      G.vRotX = 0; G.vRotY = 0;

      if (e.touches.length === 1) {
        G.mode = 'drag';
        G.lastX = e.touches[0].clientX;
        G.lastY = e.touches[0].clientY;
        G.lastMoveTime = Date.now();
        if (S.spin) { S.spin = false; btnSpin.classList.remove('on'); }
      }
      if (e.touches.length === 2) {
        G.mode      = 'pinch';
        G.lastDist  = getTouchDist(e.touches[0], e.touches[1]);
        G.lastAngle = getTouchAngle(e.touches[0], e.touches[1]);
        if (S.spin) { S.spin = false; btnSpin.classList.remove('on'); }
      }
    }, { passive: false });

    document.addEventListener('touchmove', e => {
      if (!S.detected) return;
      e.preventDefault();

      if (e.touches.length === 1 && G.mode === 'drag') {
        const dx  = e.touches[0].clientX - G.lastX;
        const dy  = e.touches[0].clientY - G.lastY;
        const now = Date.now();
        const dt  = Math.max(1, now - G.lastMoveTime);

        S.rotY += dx * 0.5;
        S.rotX  = Math.max(-75, Math.min(75, S.rotX + dy * 0.5));

        G.vRotY = (dx * 0.5) * (16 / dt);
        G.vRotX = (dy * 0.5) * (16 / dt);
        G.lastX = e.touches[0].clientX;
        G.lastY = e.touches[0].clientY;
        G.lastMoveTime = now;
        applyTransform();
      }

      if (e.touches.length === 2 && G.mode === 'pinch') {
        const newDist  = getTouchDist(e.touches[0], e.touches[1]);
        const newAngle = getTouchAngle(e.touches[0], e.touches[1]);

        const ratio = Math.max(0.85, Math.min(1.15, newDist / G.lastDist));
        S.scale = Math.max(SCALE_MIN, Math.min(SCALE_MAX, S.scale * ratio));

        const dAngle = newAngle - G.lastAngle;
        if (Math.abs(dAngle) < 20) S.rotY += dAngle * 1.2;

        G.lastDist  = newDist;
        G.lastAngle = newAngle;
        applyTransform();
      }
    }, { passive: false });

    document.addEventListener('touchend', e => {
      if (e.touches.length === 0) {
        if (G.mode === 'drag') inertiaFrame = requestAnimationFrame(applyInertia);
        G.mode = null;
      }
      if (e.touches.length === 1 && G.mode === 'pinch') {
        G.mode = 'drag';
        G.lastX = e.touches[0].clientX;
        G.lastY = e.touches[0].clientY;
        G.lastMoveTime = Date.now();
      }
    }, { passive: false });

    </script>
  </body>
</html>
